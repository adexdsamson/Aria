<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aria — Desktop</title>
<link rel="stylesheet" href="shared.css" />
<style>
  html, body { height: 100%; background: #EDEAE4; overflow-y: auto; }
  body::before { display: none; }   /* texture lives inside the window for the desktop */
  /* keyframes */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse  { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* Nav back */
  .nav-back-top{
    position: fixed; top: 14px; left: 16px; z-index: 1000;
    font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gray);
    background: rgba(250,250,248,0.95);
    padding: 6px 12px; border-radius: 4px;
    border: 1px solid var(--rule);
    backdrop-filter: blur(8px);
  }
  .nav-back-top:hover{ color: var(--gold); }

  /* Custom slim scrollbar inside the window content */
  .app-root *::-webkit-scrollbar{ width: 8px; height: 8px; }
  .app-root *::-webkit-scrollbar-thumb{ background: var(--rule-strong); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  .app-root *::-webkit-scrollbar-thumb:hover{ background: var(--gray-soft); border: 2px solid transparent; background-clip: content-box; }

  /* The "desktop wallpaper" feel behind window chrome */
  .desktop-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(184,134,11,0.05), transparent 50%),
      radial-gradient(ellipse at 92% 88%, rgba(26,26,26,0.04), transparent 50%),
      #EDEAE4;
  }
  #root { position: relative; z-index: 1; }
</style>
</head>
<body>

<a class="nav-back-top" href="index.html">← Contents</a>

<div class="desktop-bg"></div>
<div id="root" class="app-root"></div>
