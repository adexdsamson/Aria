<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Aria">
  <!-- Mirrors src/renderer/components/editorial/MonogramSquare.tsx
       (ivory squircle + serif "A" + gold underline rule). -->
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1A1A1A" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="54" ry="54"
        fill="#FAFAF8" stroke="#E8E4DF" stroke-width="2"
        filter="url(#cardShadow)" />
  <!-- Serif "A" — Playfair-style metrics. -->
  <text x="128" y="178"
        text-anchor="middle"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-weight="500"
        font-size="170"
        fill="#1A1A1A">A</text>
  <!-- Gold underline rule -->
  <rect x="90" y="186" width="76" height="3" fill="#B8860B" />
</svg>
