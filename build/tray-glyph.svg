<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Aria">
  <!-- Tray glyph (Windows .ico). High-contrast gold tile + ivory "A" so it
       reads clearly at 16px on both dark and light system trays.
       Distinct from build/icon.svg (the light app-launcher tile). -->
  <rect x="12" y="12" width="232" height="232" rx="52" ry="52"
        fill="#B8860B" stroke="#8E6708" stroke-width="2" />
  <text x="128" y="190"
        text-anchor="middle"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-weight="700"
        font-size="200"
        fill="#FAFAF8">A</text>
</svg>
