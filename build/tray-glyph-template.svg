<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Aria">
  <!-- macOS menu-bar Template glyph: pure black "A" on transparent. AppKit
       (filename ends in "Template") auto-inverts to white on dark menu bars.
       MUST be black + alpha only — no colour, no tile. -->
  <text x="128" y="196"
        text-anchor="middle"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-weight="700"
        font-size="212"
        fill="#000000">A</text>
</svg>
