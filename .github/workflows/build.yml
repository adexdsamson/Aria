name: Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Allow the workflow to create releases and upload assets
permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    outputs:
      exe_name: ${{ steps.find_exe.outputs.exe_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_DUAL_BUILD: '1'

      - name: Build (vite)
        run: pnpm run build

      - name: Package Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Find installer filename
        id: find_exe
        shell: bash
        run: echo "exe_name=$(ls dist/*.exe | head -1 | xargs basename)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 14

  build-mac:
    runs-on: macos-latest
    outputs:
      dmg_name: ${{ steps.find_dmg.outputs.dmg_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_DUAL_BUILD: '1'

      - name: Build (vite)
        run: pnpm run build

      - name: Package macOS DMG (unsigned)
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Find DMG filename
        id: find_dmg
        run: echo "dmg_name=$(ls dist/*.dmg | head -1 | xargs basename)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 14

  release:
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # Publishes to the PUBLIC mirror repo adexdsamson/aria-releases so
      # anonymous users (clicking the landing page Download buttons) can
      # actually fetch the binaries. The main adexdsamson/Aria repo is
      # private — its release-asset URLs return 404 without auth, so a
      # public mirror is the simplest way to expose downloads without
      # making the source repo public.
      #
      # Requires a fine-grained PAT in secret RELEASES_TOKEN with
      # Contents: Read & write on adexdsamson/aria-releases only.
      - name: Create or update pre-release on public mirror
        uses: softprops/action-gh-release@v2
        with:
          repository: adexdsamson/aria-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: dev-${{ steps.sha.outputs.short }}
          name: "Dev build ${{ steps.sha.outputs.short }}"
          body: |
            **Test build** — not signed or notarized.

            | Platform | Notes |
            |---|---|
            | Windows | May show SmartScreen warning — click "More info → Run anyway" |
            | macOS | Right-click the app → Open to bypass Gatekeeper on first launch |

            Source commit: adexdsamson/Aria@${{ github.sha }}
          prerelease: true
          files: dist/*
